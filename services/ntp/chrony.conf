# Upstream time sources
pool se.pool.ntp.org iburst

# Allow your networks
allow 10.0.0.0/8
allow 172.16.0.0/12
allow 192.168.0.0/16

# Bind explicitly (optional but clean)
bindaddress 0.0.0.0

# Serve time even if temporarily unsynced (lab-friendly)
local stratum 10

# Drift file
driftfile /var/lib/chrony/drift

# Logging (optional but useful)
logdir /var/log/chrony