services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: CHANGE_ME
      KC_HOSTNAME: auth.sddc.lab
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/certs/auth.sddc.lab.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/certs/auth.sddc.lab.key
    volumes:
      - /opt/keycloak/data:/opt/keycloak/data
      - /opt/keycloak/certs:/opt/keycloak/certs:ro
    command: start --https-port=8443
