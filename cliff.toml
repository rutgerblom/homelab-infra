[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""

body = """
{% if version %}
## {{ version }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
## Unreleased
{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.raw_message | split(pat="\n") | first | trim }}
{% endfor %}

{% endfor %}
"""

trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"

[[commit_parsers]]
message = "^feat"
group = "Features"

[[commit_parsers]]
message = "^fix"
group = "Fixes"

[[commit_parsers]]
message = "^docs"
group = "Documentation"

[[commit_parsers]]
message = "^refactor"
group = "Refactoring"

[[commit_parsers]]
message = "^perf"
group = "Performance"

[[commit_parsers]]
message = "^chore"
group = "Chores"

[[commit_parsers]]
message = ".*"
group = "Other"
